trigger:
  branches:
    include:
      - main
      - develop

variables:
  - group: taskapp-variables # Links your variables group fields cleanly
  - name: imageRepository
    value: 'taskapp-backend'

stages:
# ==========================================
# STAGE 1: BUILD & IMAGE COMPILATION
# ==========================================
- stage: Build
  displayName: 'Build and Push Backend Container'
  jobs:
  - job: BuildAndPush
    displayName: 'Docker Build & Push to ACR'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    # STEP 1: LOGIN TO AZURE CONTAINER REGISTRY VIA AZURE SERVICE CONNECTION
    - task: Docker@2
      displayName: 'Step 1: Authenticate with ACR'
      inputs:
        containerRegistryType: 'Azure Container Registry'
        azureSubscriptionEndpoint: 'sc-taskapp-student'
        azureContainerRegistry: 'acrtaskappyaliaider.azurecr.io'
        command: 'login'

    # STEP 2 & 3: BUILD AND PUSH IMAGE DIRECTLY USING RAW BASH SCRIPT LAYERS
    - bash: |
        echo "=== Building Docker Image ==="
        docker build -f $(Build.SourcesDirectory)/backend/Dockerfile \
          -t acrtaskappyaliaider.azurecr.io/taskapp-backend:$(Build.BuildId) \
          -t acrtaskappyaliaider.azurecr.io/taskapp-backend:latest \
          $(Build.SourcesDirectory)/backend

        echo "=== Pushing Image to Azure ==="
        docker push acrtaskappyaliaider.azurecr.io/taskapp-backend:$(Build.BuildId)
        docker push acrtaskappyaliaider.azurecr.io/taskapp-backend:latest
      displayName: 'Step 2: Build & Push Container to Azure'
# ==========================================
# STAGE 2: DEVELOPMENT ENVIRONMENT DEPLOYMENT
# ==========================================
- stage: DeployDev
  displayName: 'Deploy to Development App Service'
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
  jobs:
  - job: DeployDevJob
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: AzureWebAppContainer@1
      displayName: 'Update Dev App Service Container'
      inputs:
        azureSubscription: '$(AZURE_SUBSCRIPTION)'
        appName: 'app-taskapp-backend-AliHaider'
        imageName: '$(DOCKER_REGISTRY)/$(imageRepository):$(Build.BuildId)'

# ==========================================
# STAGE 3: PRODUCTION ENVIRONMENT DEPLOYMENT
# ==========================================
- stage: DeployProd
  displayName: 'Deploy to Production App Service'
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployProdJob
    displayName: 'Regulated Release Sequence'
    pool:
      vmImage: 'ubuntu-latest'
    environment: 'Production' # Triggers your configured Manual Approval Gate check
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebAppContainer@1
            displayName: 'Publish Stable Image Live'
            inputs:
              azureSubscription: '$(AZURE_SUBSCRIPTION)'
              appName: 'app-taskapp-backend-AliHaider'
              imageName: '$(DOCKER_REGISTRY)/$(imageRepository):$(Build.BuildId)'