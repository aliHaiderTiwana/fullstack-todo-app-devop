server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Checks for file matches, falls back to index.html for React Router
        try_files $uri $uri/ /index.html;
    }

    # Optional optimizations for error logging
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}